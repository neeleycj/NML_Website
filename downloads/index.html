<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <link rel="icon" type="image/png" href="../Assets/NML_Final_Logo.png">
        <title>No Man's Land</title>
        <link rel="stylesheet" href="../style.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <header class="main-banner">
            <div class="banner-content">
                <div class="logo">
                    <img src="../Assets/NML_Final_Logo.png" alt="Game Logo" class="banner-logo-img" fetchpriority="high" loading="eager">
                </div>

                <nav class="banner-buttons">
                    <a href="../" class="nav-btn">Home</a>
                    <a href="../how-to-play/" class="nav-btn">How To Play</a>
                    <a href="../card-gallary/" class="nav-btn">Card Gallary</a>
                </nav>
            </div>
        </header>

        <main class="content">
            <div class="downloads-container">
                <h1>Downloads</h1>
                <h2>Deck Builder Tool (Updated 3/12/26)</h2>
                    <a href="https://drive.google.com/file/d/1N181UV64yaGuAPT2AQd58Dts3utvzU95/view?usp=drive_link" target="_blank" class="download-btn"> Download (1.7GB)
                    </a>
                <h2>Playtest Tool (Updated 3/12/26)</h2>
                    <a href="https://drive.google.com/file/d/1qZ88FuMvKikA5ITnIXZT-iOIHxzTMVad/view?usp=drive_link" target="_blank" class="download-btn"> Download (1.3GB)
                    </a>
            </div>

        </main>
        <div class="links-container">
            <div>Join Us On Our Socials!</div>
            <div class="links">
            <a href="https://discord.gg/ymBTwPd3w2" class="social-link">
                <img src="../Assets/discord-logo.png" alt="discord logo" class="social-logo-img">
            </a>
            <a href="https://www.twitch.tv/nomanslandtcg" class="social-link">
                <img src="../Assets/twitch-logo.png" alt="twitch logo" class="social-logo-img">
            </a>
            <a href="https://www.instagram.com/nomanslandtcg/" class="social-link">
                <img src="../Assets/insta-logo.png" alt="instagram logo" class="social-logo-img">
            </a>
            </div>
        </div>
        <div class="RLS-logo">
            <img src="../Assets/RLS_Logo.png" alt="RLS Logo" class="RLS-logo-img" fetchpriority="high" loading="eager">
        </div>
    </body>
</html>
