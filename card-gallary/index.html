<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <link rel="icon" type="image/png" href="../Assets/NML_Final_Logo.png">
        <title>No Man's Land — Card Gallery</title>
        <link rel="stylesheet" href="../style.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">

        <style>
            :root {
                --s1-bg:       #0d0b12;
                --s1-surface:  #13111c;
                --s1-surface2: #1c1929;
                --s1-border:   #2e2845;
                --s1-accent:   #9b6dff;
                --s1-gold:     #c8a84b;
                --s1-text:     #e8e0f5;
                --s1-muted:    #7a708e;
                --s1-radius:   10px;
                --c-arcane:       #6e4d9a;
                --c-primal:       #d73e40;
                --c-refined:      #73d573;
                --c-tech:         #f97316;
                --c-multi:        #c8a84b;
                --c-resourceless: #9e9e9e;
            }
            .gallery-page {
                background: var(--s1-bg);
                min-height: 60vh;
                padding-top: var(--header-height, 0px);
                padding-bottom: 60px;
            }
            .set-hero {
                background: linear-gradient(160deg, #1a1430 0%, #0d0b12 70%);
                border-bottom: 1px solid var(--s1-border);
                padding: 40px 32px 32px;
                position: relative;
                overflow: hidden;
            }
            .set-hero::after {
                content: '';
                position: absolute; top: -80px; right: -80px;
                width: 420px; height: 420px;
                background: radial-gradient(circle, #6a3fcf1a 0%, transparent 70%);
                pointer-events: none;
            }
            .set-hero-inner {
                max-width: 1440px;
                margin: 0 auto;
                display: flex;
                align-items: center;
                gap: 20px;
                flex-wrap: wrap;
            }
            .set-emblem {
                width: 64px; height: 64px;
                border-radius: 12px;
                overflow: hidden;
                box-shadow: 0 0 28px #9b6dff44;
                flex-shrink: 0;
            }
            .set-emblem img { width: 100%; height: 100%; object-fit: cover; }
            .set-hero-text h1 {
                font-family: 'Cinzel', serif;
                font-size: clamp(1.6rem, 3.5vw, 2.6rem);
                font-weight: 700;
                background: linear-gradient(90deg, #e8e0f5 30%, var(--s1-gold) 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                letter-spacing: 0.05em;
                line-height: 1;
                margin-bottom: 8px;
            }
            .set-badges { display: flex; gap: 10px; flex-wrap: wrap; }
            .set-badge {
                display: inline-flex; align-items: center; gap: 5px;
                background: var(--s1-surface2);
                border: 1px solid var(--s1-border);
                border-radius: 20px;
                padding: 3px 12px;
                font-size: 0.78rem;
                color: var(--s1-text);
                letter-spacing: 0.05em;
                font-family: 'Cinzel', serif;
            }
            .s1-controls {
                position: sticky; top: var(--header-height, 0px); z-index: 50;
                background: #0f0d18f2;
                backdrop-filter: blur(14px);
                -webkit-backdrop-filter: blur(14px);
                border-bottom: 1px solid var(--s1-border);
                padding: 10px 32px;
            }
            .s1-controls-inner {
                max-width: 1440px;
                margin: 0 auto;
                display: flex;
                gap: 12px;
                align-items: center;
                flex-wrap: wrap;
                row-gap: 8px;
            }
            .s1-ctrl-divider {
                width: 1px; height: 28px;
                background: var(--s1-border);
                flex-shrink: 0;
            }
            .s1-search-wrap {
                position: relative;
                flex: 1; min-width: 160px; max-width: 260px;
            }
            .s1-search-wrap svg {
                position: absolute; left: 10px; top: 50%;
                transform: translateY(-50%);
                color: var(--s1-muted);
                pointer-events: none;
                width: 14px; height: 14px;
            }
            #s1-search {
                width: 100%;
                background: var(--s1-surface2);
                border: 1px solid var(--s1-border);
                border-radius: 8px;
                padding: 7px 10px 7px 32px;
                color: var(--s1-text);
                font-family: 'Crimson Pro', serif;
                font-size: 0.95rem;
                outline: none;
                transition: border-color 0.2s;
            }
            #s1-search:focus { border-color: var(--s1-accent); }
            #s1-search::placeholder { color: var(--s1-muted); }
            .s1-filter-group { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
            .s1-filter-label {
                color: var(--s1-muted);
                font-size: 0.68rem;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                font-family: 'Cinzel', serif;
                white-space: nowrap;
                margin-right: 2px;
            }
            .s1-color-btn {
                width: 32px; height: 32px;
                border-radius: 50%;
                border: 2px solid transparent;
                cursor: pointer;
                transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s, opacity 0.15s;
                display: flex; align-items: center; justify-content: center;
                outline: none;
                flex-shrink: 0;
                padding: 0;
                background: var(--s1-surface2);
                overflow: hidden;
                opacity: 0.4;
            }
            .s1-color-btn img { width: 24px; height: 24px; object-fit: contain; pointer-events: none; }
            .s1-color-btn.multi { background: radial-gradient(circle at 35% 35%, #f5d680, #c8a84b, #8b6914); }
            .s1-color-btn.resourceless { background: radial-gradient(circle at 35% 35%, #c0c0c0, #808080, #404040); }
            .s1-color-btn:hover { transform: scale(1.18); }
            .s1-color-btn.active { opacity: 1; border-color: #ffffffbb; }
            .s1-color-btn.active[data-color="A"] { box-shadow: 0 0 10px var(--c-arcane); }
            .s1-color-btn.active[data-color="P"] { box-shadow: 0 0 10px var(--c-primal); }
            .s1-color-btn.active[data-color="R"] { box-shadow: 0 0 10px var(--c-refined); }
            .s1-color-btn.active[data-color="T"] { box-shadow: 0 0 10px var(--c-tech); }
            .s1-color-btn.active[data-color="M"] { box-shadow: 0 0 10px var(--c-multi); }
            .s1-color-btn.active[data-color="X"] { box-shadow: 0 0 10px var(--c-resourceless); }
            .s1-pill-btn {
                background: var(--s1-surface2);
                border: 1px solid var(--s1-border);
                border-radius: 20px;
                padding: 4px 13px;
                font-family: 'Cinzel', serif;
                font-size: 0.70rem;
                color: var(--s1-muted);
                cursor: pointer;
                transition: background 0.15s, color 0.15s, border-color 0.15s, box-shadow 0.15s;
                letter-spacing: 0.04em;
                outline: none;
                white-space: nowrap;
                display: inline-flex; align-items: center; gap: 5px;
            }
            .s1-pill-btn:hover,
            .s1-pill-btn[data-type].active {
                background: var(--s1-accent);
                border-color: var(--s1-accent);
                color: #fff;
            }
            .s1-pill-btn.range-melee.active {
                background: #6b2a2a; border-color: #c0394a; color: #ffbfbf;
                box-shadow: 0 0 8px #c0394a44;
            }
            .s1-pill-btn.range-r2.active {
                background: #1e3a5a; border-color: #4a8fd4; color: #a8d4f8;
                box-shadow: 0 0 8px #4a8fd444;
            }
            .s1-pill-btn.range-r3.active {
                background: #1a2e50; border-color: #3a7fc4; color: #88c4f8;
                box-shadow: 0 0 8px #3a7fc444;
            }
            .range-icon {
                width: 14px; height: 14px;
                object-fit: contain;
                vertical-align: middle;
                flex-shrink: 0;
                filter: brightness(0) invert(1);
            }
            #s1-sort {
                background: var(--s1-surface2);
                border: 1px solid var(--s1-border);
                border-radius: 8px;
                padding: 6px 10px;
                color: var(--s1-text);
                font-family: 'Cinzel', serif;
                font-size: 0.70rem;
                letter-spacing: 0.04em;
                cursor: pointer;
                outline: none;
                margin-left: auto;
            }
            #s1-count { color: var(--s1-muted); font-size: 0.82rem; font-style: italic; white-space: nowrap; }
            .s1-gallery-wrap { max-width: 1440px; margin: 0 auto; padding: 24px 32px 48px; }
            #s1-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
            .s1-card {
                position: relative;
                border-radius: var(--s1-radius);
                cursor: pointer;
                outline: none;
                transition: transform 0.22s cubic-bezier(.34,1.56,.64,1);
                animation: s1FadeUp 0.3s ease both;
            }
            .s1-card:hover  { transform: translateY(-6px) scale(1.04); z-index: 20; }
            .s1-card:focus  { outline: 2px solid var(--s1-accent); outline-offset: 4px; }
            .s1-card-img-wrap {
                border-radius: var(--s1-radius);
                overflow: hidden;
                box-shadow: 0 8px 28px #00000099;
                aspect-ratio: 5 / 7;
                background: var(--s1-surface2);
                position: relative;
            }
            .s1-card-img-wrap::before {
                content: '';
                position: absolute; inset: 0; z-index: 0;
                background: linear-gradient(90deg, var(--s1-surface2) 25%, var(--s1-surface) 50%, var(--s1-surface2) 75%);
                background-size: 200% 100%;
                animation: s1Shimmer 1.5s infinite;
                border-radius: var(--s1-radius);
            }
            .s1-card-img-wrap:has(img.loaded)::before { display: none; }
            .s1-card-img-wrap img {
                position: relative; z-index: 1;
                width: 100%; height: 100%;
                object-fit: cover;
                display: block;
                border-radius: var(--s1-radius);
                opacity: 0;
                transition: opacity 0.3s;
            }
            .s1-card-img-wrap img.loaded { opacity: 1; }
            .s1-card-img-wrap::after {
                content: '';
                position: absolute; top: 0; left: 0; right: 0;
                height: 3px; z-index: 2;
                border-radius: var(--s1-radius) var(--s1-radius) 0 0;
            }
            .s1-card-img-wrap[data-color="A"]::after { background: var(--c-arcane); }
            .s1-card-img-wrap[data-color="P"]::after { background: var(--c-primal); }
            .s1-card-img-wrap[data-color="R"]::after { background: var(--c-refined); }
            .s1-card-img-wrap[data-color="T"]::after { background: var(--c-tech); }
            .s1-card-img-wrap[data-color="X"]::after { background: var(--c-resourceless); }
            .s1-card-img-wrap[data-color*=","]::after { background: linear-gradient(90deg,#f5d680,#c8a84b,#8b6914); }
            #s1-global-tooltip {
                position: fixed;
                background: #12101eee;
                border: 1px solid var(--s1-border);
                border-radius: 9px;
                padding: 10px 14px;
                white-space: nowrap;
                font-size: 0.8rem;
                color: var(--s1-text);
                pointer-events: none;
                opacity: 0;
                transition: opacity 0.15s;
                z-index: 99999;
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
                box-shadow: 0 6px 32px #000000bb;
                min-width: 200px;
                max-width: 280px;
            }
            #s1-global-tooltip.visible { opacity: 1; }
            .tt-name {
                font-family: 'Cinzel', serif;
                font-size: 0.84rem;
                font-weight: 700;
                display: block;
                margin-bottom: 5px;
                color: var(--s1-text);
                border-bottom: 1px solid var(--s1-border);
                padding-bottom: 5px;
            }
            .tt-subheader { font-size: 0.70rem; color: var(--s1-muted); font-style: italic; display: block; margin-bottom: 6px; }
            .tt-row { display: flex; justify-content: space-between; align-items: center; gap: 16px; padding: 2px 0; }
            .tt-label { color: var(--s1-muted); font-family: 'Cinzel', serif; font-size: 0.66rem; letter-spacing: 0.07em; text-transform: uppercase; }
            .tt-value        { color: var(--s1-text); font-weight: 600; font-size: 0.78rem; }
            .tt-value.gold   { color: var(--s1-gold); }
            .tt-value.red    { color: #e07878; }
            .tt-value.green  { color: #78c878; }
            .tt-value.blue   { color: #78aae0; }
            .tt-color-row { display: flex; align-items: center; gap: 5px; padding-top: 5px; margin-top: 4px; border-top: 1px solid var(--s1-border); }
            .tt-color-row img { width: 13px; height: 13px; object-fit: contain; }
            .tt-color-name { font-family: 'Cinzel', serif; font-size: 0.66rem; letter-spacing: 0.05em; color: var(--s1-muted); }
            .tt-color-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
            .tt-desc {
                font-size: 0.72rem; color: var(--s1-text); font-style: italic;
                line-height: 1.45; padding: 6px 0 4px;
                border-top: 1px solid var(--s1-border); margin-top: 4px;
                max-width: 240px; white-space: normal;
            }
            .s1-card-name {
                text-align: center; padding: 5px 4px 1px;
                font-family: 'Cinzel', serif; font-size: 0.65rem; font-weight: 600;
                letter-spacing: 0.03em; color: var(--s1-muted);
                white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
                transition: color 0.2s;
            }
            .s1-card:hover .s1-card-name { color: var(--s1-text); }
            .s1-divider {
                grid-column: 1 / -1;
                display: flex; align-items: center; gap: 14px;
                margin: 12px 0 4px;
                color: var(--s1-muted); font-family: 'Cinzel', serif;
                font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase;
            }
            .s1-divider::before, .s1-divider::after { content: ''; flex: 1; height: 1px; background: var(--s1-border); }
            .s1-empty { grid-column: 1 / -1; text-align: center; padding: 80px 20px; color: var(--s1-muted); font-family: 'Cinzel', serif; font-size: 1rem; }
            .s1-empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
            @keyframes s1Shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
            @keyframes s1FadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

            /* ── RARITY ─────────────────────────────────────────────────── */
            :root {
                --r-common:    #6b6b6b;
                --r-uncommon:  #c0c0c0;
                --r-fabled:    #c8a84b;
                --r-ascendant: #5ab4e8;
            }
            .tt-rarity {
                display: inline-block;
                font-family: 'Cinzel', serif;
                font-size: 0.68rem;
                font-weight: 700;
                letter-spacing: 0.06em;
                padding: 1px 8px;
                border-radius: 4px;
                border: 1px solid currentColor;
            }
            .rarity-common    { color: var(--r-common);    border-color: var(--r-common)55; }
            .rarity-uncommon  { color: var(--r-uncommon);  border-color: var(--r-uncommon)55;
                                text-shadow: 0 0 8px #c0c0c055; }
            .rarity-fabled    { color: var(--r-fabled);    border-color: var(--r-fabled)66;
                                text-shadow: 0 0 8px #c8a84b66; }
            .rarity-ascendant { color: var(--r-ascendant); border-color: var(--r-ascendant)66;
                                text-shadow: 0 0 10px #5ab4e888; }

            /* ── ANALYTICS PANEL ─────────────────────────────────────────── */
            #s1-analytics-btn {
                background: var(--s1-surface2);
                border: 1px solid var(--s1-border);
                border-radius: 20px;
                padding: 4px 14px;
                font-family: 'Cinzel', serif;
                font-size: 0.70rem;
                color: var(--s1-muted);
                cursor: pointer;
                transition: background 0.15s, color 0.15s, border-color 0.15s;
                letter-spacing: 0.04em;
                outline: none;
                white-space: nowrap;
                display: inline-flex; align-items: center; gap: 6px;
            }
            #s1-analytics-btn:hover,
            #s1-analytics-btn.active {
                background: #1e1a2e;
                border-color: var(--s1-accent);
                color: var(--s1-accent);
            }
            #s1-analytics-panel {
                background: #0f0d18;
                border-bottom: 1px solid var(--s1-border);
                overflow: hidden;
                max-height: 0;
                transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1);
            }
            #s1-analytics-panel.open { max-height: 900px; }
            .analytics-inner {
                max-width: 1440px;
                margin: 0 auto;
                padding: 28px 32px 36px;
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
                gap: 24px;
            }
            .analytics-card {
                background: var(--s1-surface);
                border: 1px solid var(--s1-border);
                border-radius: 12px;
                padding: 20px 22px;
            }
            .analytics-title {
                font-family: 'Cinzel', serif;
                font-size: 0.72rem;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                color: var(--s1-muted);
                margin-bottom: 16px;
                display: flex; align-items: center; gap: 8px;
            }
            .analytics-title::after {
                content: '';
                flex: 1; height: 1px; background: var(--s1-border);
            }
            /* Bar rows */
            .abar-row {
                display: flex; align-items: center; gap: 8px;
                margin-bottom: 9px;
            }
            .abar-label {
                font-family: 'Cinzel', serif;
                font-size: 0.64rem;
                color: var(--s1-muted);
                min-width: 100px;
                text-align: right;
                letter-spacing: 0.03em;
            }
            .abar-track {
                flex: 1; height: 10px;
                background: var(--s1-surface2);
                border-radius: 5px;
                overflow: hidden;
            }
            .abar-fill {
                height: 100%;
                border-radius: 5px;
                transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
            }
            .abar-count {
                font-size: 0.68rem;
                color: var(--s1-text);
                min-width: 28px;
                text-align: right;
            }
            /* Cost bar chart */
            .cost-chart {
                display: flex;
                align-items: flex-end;
                gap: 6px;
                height: 100px;
                padding-top: 8px;
            }
            .cost-col {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 4px;
                height: 100%;
                justify-content: flex-end;
            }
            .cost-bar {
                width: 100%;
                background: var(--s1-accent);
                border-radius: 4px 4px 0 0;
                transition: height 0.5s cubic-bezier(0.4,0,0.2,1);
                min-height: 2px;
                position: relative;
            }
            .cost-bar:hover .cost-bar-tip { opacity: 1; }
            .cost-count {
                font-size: 0.58rem;
                color: var(--s1-muted);
                white-space: nowrap;
            }
            .cost-label {
                font-family: 'Cinzel', serif;
                font-size: 0.60rem;
                color: var(--s1-muted);
                letter-spacing: 0.02em;
            }
            .cost-bar-tip {
                position: absolute;
                bottom: calc(100% + 4px);
                left: 50%; transform: translateX(-50%);
                background: var(--s1-surface2);
                border: 1px solid var(--s1-border);
                border-radius: 4px;
                padding: 2px 6px;
                font-size: 0.60rem;
                color: var(--s1-text);
                white-space: nowrap;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.15s;
                z-index: 10;
            }

            @media (max-width: 700px) {
                .set-hero { padding: 28px 16px 24px; }
                .s1-controls { padding: 10px 16px; }
                .s1-gallery-wrap { padding: 16px 16px 40px; }
                #s1-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
                #s1-sort { margin-left: 0; }
                .s1-ctrl-divider { display: none; }
                .analytics-inner { grid-template-columns: 1fr; padding: 20px 16px; }
            }
        </style>
    </head>
    <body>

        <header class="main-banner">
            <div class="banner-content">
                <div class="logo">
                    <img src="../Assets/NML_Final_Logo.png" alt="Game Logo" class="banner-logo-img" fetchpriority="high" loading="eager">
                </div>
                <nav class="banner-buttons">
                    <a href="../" class="nav-btn">Home</a>
                    <a href="../how-to-play/" class="nav-btn">How To Play</a>
                    <a href="../card-gallary/" class="nav-btn active">Card Gallery</a>
                    <a href="../downloads/" class="nav-btn">Downloads</a>
                    <a href="../lore/" class="nav-btn">Lore</a>
                </nav>
            </div>
        </header>

        <div class="gallery-page">
            <div class="set-hero">
                <div class="set-hero-inner">
                    <div class="set-emblem"><img src="../Assets/Set 1 Icon.png" alt="Set 1"></div>
                    <div class="set-hero-text">
                        <h1>Set 1</h1>
                        <div class="set-badges">
                            <span class="set-badge">📜 280 Cards</span>
                            <span class="set-badge">🌐 Base Set</span>
                            <span class="set-badge">🃏 Playtesting Edition</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="s1-controls">
                <div class="s1-controls-inner">
                    <div class="s1-search-wrap">
                        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                        </svg>
                        <input id="s1-search" type="text" placeholder="Search cards…" autocomplete="off">
                    </div>
                    <div class="s1-ctrl-divider"></div>
                    <div class="s1-filter-group">
                        <span class="s1-filter-label">Color</span>

        const _cardLookup = {};
        CARDS.forEach((c, i) => { _cardLookup[i] = c; });

        const ALL_INDIVIDUAL = ["A","P","R","T"];
        const ALL_COLORS     = ["A","P","R","T","M","X"];
        let activeColors = new Set(["A","P","R","T","M","X"]);
        let activeType   = "all";
        let activeRanges = new Set();
        let searchQuery  = "";
        let sortMode     = "number";

        const grid  = document.getElementById("s1-grid");
        const count = document.getElementById("s1-count");

        function cardColors(c) { return Array.isArray(c.color) ? c.color : [c.color]; }
        function cardColorLabel(c) { return cardColors(c).map(k => COLOR_LABEL[k] || k).join(" / "); }

        function getFiltered() {
            const allOn = ALL_INDIVIDUAL.every(k => activeColors.has(k)) && activeColors.has("M") && activeColors.has("X");
            const selIndividual = ALL_INDIVIDUAL.filter(k => activeColors.has(k));
            const selSet = new Set(selIndividual);

            return CARDS.filter(c => {
                if (!c.name) return false;
                if (!allOn) {
                    const cols = cardColors(c);
                    const isMulti = cols.length > 1;
                    const isRL = cols.length === 1 && cols[0] === "X";
                    if (isRL) {
                        if (!activeColors.has("X")) return false;
                    } else if (isMulti) {
                        const cardSet = new Set(cols);
                        const exactMatch = cardSet.size === selSet.size && cols.every(k => selSet.has(k));
                        if (!activeColors.has("M") && !exactMatch) return false;
                    } else {
                        const cardColor = cols[0];
                        if (!selSet.has(cardColor)) return false;
                        if (selSet.size > 1) return false;
                    }
                }
                if (activeType !== "all" && c.type !== activeType) return false;
                if (activeRanges.size > 0) {
                    const rKey = c.range === 1 ? "melee" : c.range ? String(c.range) : null;
                    if (!rKey || !activeRanges.has(rKey)) return false;
                }
                if (searchQuery) {
                    const q = searchQuery.toLowerCase();
                    if (!c.name.toLowerCase().includes(q) &&
                        !(c.subtype||"").toLowerCase().includes(q) &&
                        !c.type.toLowerCase().includes(q) &&
                        !cardColorLabel(c).toLowerCase().includes(q)) return false;
                }
                return true;
            });
        }

        function getSorted(arr) {
            const a = [...arr];
            if (sortMode === "name")   a.sort((x,y) => x.name.localeCompare(y.name));
            if (sortMode === "cost")   a.sort((x,y) => (x.cost||0)-(y.cost||0));
            if (sortMode === "power")  a.sort((x,y) => (y.power||0)-(x.power||0));
            if (sortMode === "number") a.sort((x,y) => x.number-y.number);
            return a;
        }

        function blankCard(name) {
            return `data:image/svg+xml,${encodeURIComponent(
                `<svg xmlns="http://www.w3.org/2000/svg" width="170" height="238" viewBox="0 0 170 238">
                    <rect width="170" height="238" rx="8" fill="#1c1929"/>
                    <text x="85" y="100" dominant-baseline="middle" text-anchor="middle" fill="#2e2845" font-size="52">🃏</text>
                    <text x="85" y="148" dominant-baseline="middle" text-anchor="middle" fill="#7a708e" font-size="9" font-family="Georgia,serif">${name}</text>
                </svg>`
            )}`;
        }

        function rangeIcon(range) {
            if (range === 1) return `<img src="../Assets/Attack.png"  class="range-icon" alt="Melee"> Melee`;
            if (range === 2) return `<img src="../Assets/Range2.png" class="range-icon" alt="Range 2"> Range 2`;
            if (range === 3) return `<img src="../Assets/Range3.png" class="range-icon" alt="Range 3"> Range 3`;
            return `Range ${range}`;
        }

        function buildTooltip(c) {
            const cols = Array.isArray(c.color) ? c.color : [c.color];
            const colorHtml = cols.map(k => {
                const icon = COLOR_ICON[k];
                return icon
                    ? `<img src="${icon}" alt="${COLOR_LABEL[k]}" style="width:13px;height:13px;object-fit:contain;"><span class="tt-color-name">${COLOR_LABEL[k]}</span>`
                    : `<span class="tt-color-dot" style="background:${k==="X"?"#9e9e9e":"#c8a84b"}"></span><span class="tt-color-name">${COLOR_LABEL[k]}</span>`;
            }).join('<span style="color:var(--s1-border);margin:0 2px">·</span>');

            let rows = "";
            if (c.type === "Creature") {
                rows = `
                    <div class="tt-row"><span class="tt-label">Cost</span>   <span class="tt-value gold">${c.cost ?? "—"}</span></div>
                    <div class="tt-row"><span class="tt-label">Range</span>  <span class="tt-value blue" style="display:flex;align-items:center;gap:4px">${rangeIcon(c.range)}</span></div>
                    <div class="tt-row"><span class="tt-label">Attack</span> <span class="tt-value red">${c.power ?? "—"}</span></div>
                    <div class="tt-row"><span class="tt-label">Health</span> <span class="tt-value green">${c.health ?? "—"}</span></div>`;
            } else if (c.type === "Spell") {
                rows = `
                    <div class="tt-row"><span class="tt-label">Cost</span>    <span class="tt-value gold">${c.cost ?? "—"}</span></div>
                    <div class="tt-row"><span class="tt-label">Subtype</span> <span class="tt-value">${c.subtype ?? "—"}</span></div>`;
            } else if (c.type === "Terrain") {
                rows = `
                    <div class="tt-row"><span class="tt-label">Cost</span>    <span class="tt-value gold">${c.cost ?? "—"}</span></div>
                    <div class="tt-row"><span class="tt-label">Subtype</span> <span class="tt-value">${c.subtype ?? "—"}</span></div>`;
            } else if (c.type === "Construct") {
                rows = `
                    <div class="tt-row"><span class="tt-label">Cost</span>   <span class="tt-value gold">${c.cost ?? "—"}</span></div>
                    <div class="tt-row"><span class="tt-label">Health</span> <span class="tt-value green">${c.health ?? "—"}</span></div>`;
            }
            const descHtml = c.desc ? `<div class="tt-desc">${c.desc}</div>` : "";

            // Rarity badge
            const rarityClass = {
                "Common":         "rarity-common",
                "Uncommon":       "rarity-uncommon",
                "Fabled Rare":    "rarity-fabled",
                "Ascendant Rare": "rarity-ascendant"
            }[c.rarity] || "rarity-common";
            const rarityLabel = c.rarity || "Common";
            const rarityHtml = `<div class="tt-row" style="margin-top:6px;padding-top:6px;border-top:1px solid var(--s1-border)">
                <span class="tt-label">Rarity</span>
                <span class="tt-rarity ${rarityClass}">${rarityLabel}</span>
            </div>`;

            return `
                <span class="tt-name">${c.name}</span>
                <span class="tt-subheader">${c.type}${c.subtype ? " — " + c.subtype : ""}</span>
                ${rows}${descHtml}
                <div class="tt-color-row">${colorHtml}</div>
                ${rarityHtml}`;
        }

        const TYPE_ORDER = ["Creature","Spell","Terrain","Construct"];

        function buildCardHtml(c, delayIdx) {
            const cardIdx = CARDS.indexOf(c);
            const delay   = Math.min(delayIdx * 14, 350);
            const src     = CARD_BASE_URL + encodeURIComponent(c.file);
            return `
            <div class="s1-card" tabindex="0" data-idx="${cardIdx}" style="animation-delay:${delay}ms">
                <div class="s1-card-img-wrap" data-color="${Array.isArray(c.color)?c.color.join(','):c.color}">
                    <img src="${src}" alt="${c.name}" loading="lazy"
                        onload="this.classList.add('loaded')"
                        onerror="this.src='${blankCard(c.name)}';this.classList.add('loaded')">
                </div>
                <div class="s1-card-name">${c.name}</div>
            </div>`;
        }

        function renderGrid() {
            const filtered = getSorted(getFiltered());
            count.textContent = `${filtered.length} card${filtered.length !== 1 ? "s" : ""}`;
            if (!filtered.length) {
                grid.innerHTML = `<div class="s1-empty"><div class="s1-empty-icon">🔍</div>No cards match your filters.</div>`;
                return;
            }
            let html = "";
            let delayIdx = 0;
            if (activeType === "all") {
                filtered.forEach(c => { html += buildCardHtml(c, delayIdx++); });
            } else {
                const grouped = {};
                filtered.forEach(c => (grouped[c.type] = grouped[c.type] || []).push(c));
                TYPE_ORDER.forEach(type => {
                    if (!grouped[type]) return;
                    html += `<div class="s1-divider">${type}s &nbsp;(${grouped[type].length})</div>`;
                    grouped[type].forEach(c => { html += buildCardHtml(c, delayIdx++); });
                });
            }
            grid.innerHTML = html;
            grid.querySelectorAll(".s1-card[data-idx]").forEach(el => {
                el._cardData = _cardLookup[+el.dataset.idx];
            });
        }

        const gtt = document.createElement("div");
        gtt.id = "s1-global-tooltip";
        document.body.appendChild(gtt);
        let ttHideTimer = null;

        function showTooltip(card, event) {
            const c = card._cardData;
            if (!c) return;
            clearTimeout(ttHideTimer);
            gtt.innerHTML = buildTooltip(c);
            gtt.classList.add("visible");
            positionTooltip(event);
        }
        function hideTooltip() { ttHideTimer = setTimeout(() => gtt.classList.remove("visible"), 80); }
        function positionTooltip(event) {
            const TIP_GAP = 12;
            const tw = gtt.offsetWidth || 200;
            const th = gtt.offsetHeight || 120;
            let x = event.clientX - tw / 2;
            let y = event.clientY - th - TIP_GAP;
            if (x < 8) x = 8;
            if (x + tw > window.innerWidth - 8) x = window.innerWidth - tw - 8;
            if (y < 8) y = event.clientY + TIP_GAP;
            gtt.style.left = x + "px";
            gtt.style.top  = y + "px";
        }
        grid.addEventListener("mouseover", e => { const card = e.target.closest(".s1-card"); if (card) showTooltip(card, e); });
        grid.addEventListener("mousemove", e => { if (gtt.classList.contains("visible")) positionTooltip(e); });
        grid.addEventListener("mouseout",  e => { if (!e.relatedTarget || !e.relatedTarget.closest(".s1-card")) hideTooltip(); });

        function syncColorBtnVisuals() {
            document.querySelectorAll(".s1-color-btn").forEach(btn => {
                btn.classList.toggle("active", activeColors.has(btn.dataset.color));
            });
        }
        document.querySelectorAll(".s1-color-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                const c = btn.dataset.color;
                const allOn = ALL_COLORS.every(k => activeColors.has(k));
                if (allOn) {
                    activeColors.clear();
                    activeColors.add(c);
                } else {
                    if (activeColors.has(c)) {
                        activeColors.delete(c);
                        if (activeColors.size === 0) ALL_COLORS.forEach(k => activeColors.add(k));
                    } else {
                        activeColors.add(c);
                        if (ALL_COLORS.every(k => activeColors.has(k))) ALL_COLORS.forEach(k => activeColors.add(k));
                    }
                }
                syncColorBtnVisuals();
                renderGrid();
            });
        });

        document.querySelectorAll(".s1-pill-btn[data-type]").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".s1-pill-btn[data-type]").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                activeType = btn.dataset.type;
                renderGrid();
            });
        });

        function syncRangeBtnVisuals() {
            document.querySelectorAll(".s1-pill-btn[data-range]").forEach(btn => {
                const v = btn.dataset.range;
                btn.classList.toggle("active", v === "all" ? activeRanges.size === 0 : activeRanges.has(v));
            });
        }
        document.querySelectorAll(".s1-pill-btn[data-range]").forEach(btn => {
            btn.addEventListener("click", () => {
                const v = btn.dataset.range;
                if (v === "all") { activeRanges.clear(); }
                else { activeRanges.has(v) ? activeRanges.delete(v) : activeRanges.add(v); }
                syncRangeBtnVisuals();
                renderGrid();
            });
        });

        document.getElementById("s1-search").addEventListener("input", e => { searchQuery = e.target.value.trim(); renderGrid(); });
        document.getElementById("s1-sort").addEventListener("change", e => { sortMode = e.target.value; renderGrid(); });

        function setHeaderOffset() {
            const header = document.querySelector("header.main-banner");
            if (header) document.documentElement.style.setProperty("--header-height", header.getBoundingClientRect().height + "px");
        }
        setHeaderOffset();
        window.addEventListener("resize", setHeaderOffset);

        // ── ANALYTICS ─────────────────────────────────────────────────────
        const RARITY_ORDER  = ["Common","Uncommon","Fabled Rare","Ascendant Rare"];
        const RARITY_COLORS = {
            "Common":         "#6b6b6b",
            "Uncommon":       "#c0c0c0",
            "Fabled Rare":    "#c8a84b",
            "Ascendant Rare": "#5ab4e8"
        };
        const TYPE_COLORS  = { Creature:"#9b6dff", Spell:"#5ab4e8", Terrain:"#73d573", Construct:"#f97316" };
        const COLOR_COLORS = { A:"#6e4d9a", P:"#d73e40", R:"#73d573", T:"#f97316", M:"#c8a84b", X:"#9e9e9e" };

        function makeBarRow(label, count, max, color) {
            const pct = max > 0 ? Math.round((count / max) * 100) : 0;
            return `<div class="abar-row">
                <span class="abar-label">${label}</span>
                <div class="abar-track">
                    <div class="abar-fill" style="width:${pct}%;background:${color}"></div>
                </div>
                <span class="abar-count">${count}</span>
            </div>`;
        }

        function renderAnalytics() {
            const src = CARDS.filter(c => c.name);
            const total = src.length;

            // ── Rarity distribution ──────────────────────────────────────
            const rarityCounts = {};
            RARITY_ORDER.forEach(r => rarityCounts[r] = 0);
            src.forEach(c => { const r = c.rarity || "Common"; rarityCounts[r] = (rarityCounts[r]||0) + 1; });
            const rarityMax = Math.max(...Object.values(rarityCounts));
            let rarityHtml = RARITY_ORDER.map(r =>
                makeBarRow(r, rarityCounts[r], rarityMax, RARITY_COLORS[r])
            ).join("");

            // ── Type distribution ────────────────────────────────────────
            const typeCounts = { Creature:0, Spell:0, Terrain:0, Construct:0 };
            src.forEach(c => { if (typeCounts[c.type] !== undefined) typeCounts[c.type]++; });
            const typeMax = Math.max(...Object.values(typeCounts));
            let typeHtml = Object.entries(typeCounts).map(([t, n]) =>
                makeBarRow(t, n, typeMax, TYPE_COLORS[t])
            ).join("");

            // ── Color/Resource distribution ──────────────────────────────
            const colCounts = { A:0, P:0, R:0, T:0, M:0, X:0 };
            src.forEach(c => {
                const cols = Array.isArray(c.color) ? c.color : [c.color];
                if (cols.length > 1) colCounts["M"]++;
                else colCounts[cols[0]] = (colCounts[cols[0]]||0) + 1;
            });
            const colMax = Math.max(...Object.values(colCounts));
            const colLabels = { A:"Arcane", P:"Primal", R:"Refined", T:"Tech", M:"Multi", X:"Resourceless" };
            let colHtml = Object.entries(colCounts).map(([k, n]) =>
                makeBarRow(colLabels[k], n, colMax, COLOR_COLORS[k])
            ).join("");

            // ── Cost bar chart ───────────────────────────────────────────
            const costBuckets = {};
            for (let i = 0; i <= 9; i++) costBuckets[i] = 0;
            costBuckets["10+"] = 0;
            src.forEach(c => {
                const cost = c.cost ?? 0;
                const key = cost >= 10 ? "10+" : cost;
                costBuckets[key] = (costBuckets[key]||0) + 1;
            });
            const costMax = Math.max(...Object.values(costBuckets));
            const costKeys = [...Array.from({length:10},(_,i)=>i), "10+"];
            const costCols = costKeys.map(k => {
                const n = costBuckets[k] || 0;
                const pct = costMax > 0 ? (n / costMax) * 100 : 0;
                const accent = n === costMax && n > 0 ? "#c8a84b" : "#9b6dff";
                return `<div class="cost-col">
                    <span class="cost-count">${n > 0 ? n : ""}</span>
                    <div class="cost-bar" style="height:${Math.max(pct,1)}%;background:${accent}">
                        <div class="cost-bar-tip">${k} cost: ${n}</div>
                    </div>
                    <span class="cost-label">${k}</span>
                </div>`;
            }).join("");

            document.getElementById("s1-analytics-inner").innerHTML = `
                <div class="analytics-card">
                    <div class="analytics-title">Rarity Distribution</div>
                    ${rarityHtml}
                    <div style="font-size:0.60rem;color:var(--s1-muted);margin-top:10px;font-style:italic">${total} total cards</div>
                </div>
                <div class="analytics-card">
                    <div class="analytics-title">Card Type Distribution</div>
                    ${typeHtml}
                </div>
                <div class="analytics-card">
                    <div class="analytics-title">Resource Distribution</div>
                    ${colHtml}
                </div>
                <div class="analytics-card" style="grid-column:span 1">
                    <div class="analytics-title">Resource Cost</div>
                    <div class="cost-chart">${costCols}</div>
                    <div style="font-size:0.60rem;color:var(--s1-muted);margin-top:8px;font-style:italic;text-align:center">Cards per cost value (gold bar = most common)</div>
                </div>`;
        }

        const analyticsBtn   = document.getElementById("s1-analytics-btn");
        const analyticsPanel = document.getElementById("s1-analytics-panel");
        let analyticsOpen    = false;

        analyticsBtn.addEventListener("click", () => {
            analyticsOpen = !analyticsOpen;
            analyticsBtn.classList.toggle("active", analyticsOpen);
            analyticsPanel.classList.toggle("open", analyticsOpen);
            if (analyticsOpen) renderAnalytics();
        });

        renderGrid();
        </script>
    </body>
</html>
