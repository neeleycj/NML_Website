<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <link rel="icon" type="image/png" href="../Assets/NML_Final_Logo.png">
        <title>No Man's Land — Card Gallery</title>
        <link rel="stylesheet" href="../style.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
 
        <style>
            /* ── VARIABLES ──────────────────────────────────────────────── */
            :root {
                --s1-bg:       #0d0b12;
                --s1-surface:  #13111c;
                --s1-surface2: #1c1929;
                --s1-border:   #2e2845;
                --s1-accent:   #9b6dff;
                --s1-gold:     #c8a84b;
                --s1-text:     #e8e0f5;
                --s1-muted:    #7a708e;
                --s1-radius:   10px;
 
                --c-arcane:       #6e4d9a;
                --c-primal:       #d73e40;
                --c-refined:      #73d573;
                --c-tech:         #e46f0b;
                --c-multi:        #c8a84b;
                --c-resourceless: #9e9e9e;
            }
 
            /* ── GALLERY WRAPPER ─────────────────────────────────────────── */
            .gallery-page {
                background: var(--s1-bg);
                min-height: 60vh;
                padding-top: var(--header-height, 0px);
                padding-bottom: 60px;
            }
 
            /* ── SET HERO ───────────────────────────────────────────────── */
            .set-hero {
                background: linear-gradient(160deg, #1a1430 0%, #0d0b12 70%);
                border-bottom: 1px solid var(--s1-border);
                padding: 40px 32px 32px;
                position: relative;
                overflow: hidden;
            }
            .set-hero::after {
                content: '';
                position: absolute; top: -80px; right: -80px;
                width: 420px; height: 420px;
                background: radial-gradient(circle, #6a3fcf1a 0%, transparent 70%);
                pointer-events: none;
            }
            .set-hero-inner {
                max-width: 1440px;
                margin: 0 auto;
                display: flex;
                align-items: center;
                gap: 20px;
                flex-wrap: wrap;
            }
            .set-emblem {
                width: 64px; height: 64px;
                border-radius: 12px;
                overflow: hidden;
                box-shadow: 0 0 28px #9b6dff44;
                flex-shrink: 0;
            }
            .set-emblem img { width: 100%; height: 100%; object-fit: cover; }
            .set-hero-text h1 {
                font-family: 'Cinzel', serif;
                font-size: clamp(1.6rem, 3.5vw, 2.6rem);
                font-weight: 700;
                background: linear-gradient(90deg, #e8e0f5 30%, var(--s1-gold) 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                letter-spacing: 0.05em;
                line-height: 1;
                margin-bottom: 8px;
            }
            .set-badges { display: flex; gap: 10px; flex-wrap: wrap; }
            .set-badge {
                display: inline-flex; align-items: center; gap: 5px;
                background: var(--s1-surface2);
                border: 1px solid var(--s1-border);
                border-radius: 20px;
                padding: 3px 12px;
                font-size: 0.78rem;
                color: var(--s1-text);
                letter-spacing: 0.05em;
                font-family: 'Cinzel', serif;
            }
 
            /* ── CONTROLS BAR ───────────────────────────────────────────── */
            .s1-controls {
                position: sticky; top: var(--header-height, 0px); z-index: 50;
                background: #0f0d18f2;
                backdrop-filter: blur(14px);
                -webkit-backdrop-filter: blur(14px);
                border-bottom: 1px solid var(--s1-border);
                padding: 10px 32px;
            }
            .s1-controls-inner {
                max-width: 1440px;
                margin: 0 auto;
                display: flex;
                gap: 12px;
                align-items: center;
                flex-wrap: wrap;
                row-gap: 8px;
            }
 
            .s1-ctrl-divider {
                width: 1px;
                height: 28px;
                background: var(--s1-border);
                flex-shrink: 0;
            }
 
            /* Search */
            .s1-search-wrap {
                position: relative;
                flex: 1; min-width: 160px; max-width: 260px;
            }
            .s1-search-wrap svg {
                position: absolute; left: 10px; top: 50%;
                transform: translateY(-50%);
                color: var(--s1-muted);
                pointer-events: none;
                width: 14px; height: 14px;
            }
            #s1-search {
                width: 100%;
                background: var(--s1-surface2);
                border: 1px solid var(--s1-border);
                border-radius: 8px;
                padding: 7px 10px 7px 32px;
                color: var(--s1-text);
                font-family: 'Crimson Pro', serif;
                font-size: 0.95rem;
                outline: none;
                transition: border-color 0.2s;
            }
            #s1-search:focus { border-color: var(--s1-accent); }
            #s1-search::placeholder { color: var(--s1-muted); }
 
            /* Filter group */
            .s1-filter-group { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
            .s1-filter-label {
                color: var(--s1-muted);
                font-size: 0.68rem;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                font-family: 'Cinzel', serif;
                white-space: nowrap;
                margin-right: 2px;
            }
 
            /* ── COLOR ICON BUTTONS ─────────────────────────────────────── */
            .s1-color-btn {
                width: 32px; height: 32px;
                border-radius: 50%;
                border: 2px solid transparent;
                cursor: pointer;
                transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s, opacity 0.15s;
                display: flex; align-items: center; justify-content: center;
                outline: none;
                flex-shrink: 0;
                padding: 0;
                background: var(--s1-surface2);
                overflow: hidden;
                opacity: 0.4;
            }
            .s1-color-btn img {
                width: 24px; height: 24px;
                object-fit: contain;
                pointer-events: none;
            }
            .s1-color-btn.multi {
                background: radial-gradient(circle at 35% 35%, #f5d680, #c8a84b, #8b6914);
            }
            .s1-color-btn.resourceless {
                background: radial-gradient(circle at 35% 35%, #c0c0c0, #808080, #404040);
            }
            .s1-color-btn:hover { transform: scale(1.18); }
            .s1-color-btn.active { opacity: 1; border-color: #ffffffbb; }
            .s1-color-btn.active[data-color="A"] { box-shadow: 0 0 10px var(--c-arcane); }
            .s1-color-btn.active[data-color="P"] { box-shadow: 0 0 10px var(--c-primal); }
            .s1-color-btn.active[data-color="R"] { box-shadow: 0 0 10px var(--c-refined); }
            .s1-color-btn.active[data-color="T"] { box-shadow: 0 0 10px var(--c-tech); }
            .s1-color-btn.active[data-color="M"] { box-shadow: 0 0 10px var(--c-multi); }
            .s1-color-btn.active[data-color="X"] { box-shadow: 0 0 10px var(--c-resourceless); }
 
            /* ── PILL BUTTONS (type + range) ─────────────────────────────── */
            .s1-pill-btn {
                background: var(--s1-surface2);
                border: 1px solid var(--s1-border);
                border-radius: 20px;
                padding: 4px 13px;
                font-family: 'Cinzel', serif;
                font-size: 0.70rem;
                color: var(--s1-muted);
                cursor: pointer;
                transition: background 0.15s, color 0.15s, border-color 0.15s, box-shadow 0.15s;
                letter-spacing: 0.04em;
                outline: none;
                white-space: nowrap;
                display: inline-flex; align-items: center; gap: 5px;
            }
            .s1-pill-btn:hover,
            .s1-pill-btn[data-type].active {
                background: var(--s1-accent);
                border-color: var(--s1-accent);
                color: #fff;
            }
            .s1-pill-btn.range-melee.active {
                background: #6b2a2a;
                border-color: #c0394a;
                color: #ffbfbf;
                box-shadow: 0 0 8px #c0394a44;
            }
            .s1-pill-btn.range-ranged.active {
                background: #1e3a5a;
                border-color: #4a8fd4;
                color: #a8d4f8;
                box-shadow: 0 0 8px #4a8fd444;
            }
 
            /* Sort */
            #s1-sort {
                background: var(--s1-surface2);
                border: 1px solid var(--s1-border);
                border-radius: 8px;
                padding: 6px 10px;
                color: var(--s1-text);
                font-family: 'Cinzel', serif;
                font-size: 0.70rem;
                letter-spacing: 0.04em;
                cursor: pointer;
                outline: none;
                margin-left: auto;
            }
            /* Count */
            #s1-count {
                color: var(--s1-muted);
                font-size: 0.82rem;
                font-style: italic;
                white-space: nowrap;
            }
 
            /* ── CARD GRID ──────────────────────────────────────────────── */
            .s1-gallery-wrap {
                max-width: 1440px;
                margin: 0 auto;
                padding: 24px 32px 48px;
            }
            #s1-grid {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 24px;
            }
 
            /* ── CARD ITEM ──────────────────────────────────────────────── */
            .s1-card {
                position: relative;
                border-radius: var(--s1-radius);
                cursor: pointer;
                outline: none;
                transition: transform 0.22s cubic-bezier(.34,1.56,.64,1);
                animation: s1FadeUp 0.3s ease both;
            }
            .s1-card:hover  { transform: translateY(-6px) scale(1.04); z-index: 20; }
            .s1-card:focus  { outline: 2px solid var(--s1-accent); outline-offset: 4px; }
 
            .s1-card-img-wrap {
                border-radius: var(--s1-radius);
                overflow: hidden;
                box-shadow: 0 8px 28px #00000099;
                aspect-ratio: 5 / 7;
                background: var(--s1-surface2);
                position: relative;
            }
            /* Shimmer skeleton */
            .s1-card-img-wrap::before {
                content: '';
                position: absolute; inset: 0; z-index: 0;
                background: linear-gradient(90deg,
                    var(--s1-surface2) 25%,
                    var(--s1-surface)  50%,
                    var(--s1-surface2) 75%);
                background-size: 200% 100%;
                animation: s1Shimmer 1.5s infinite;
                border-radius: var(--s1-radius);
            }
            .s1-card-img-wrap:has(img.loaded)::before { display: none; }
            .s1-card-img-wrap img {
                position: relative; z-index: 1;
                width: 100%; height: 100%;
                object-fit: cover;
                display: block;
                border-radius: var(--s1-radius);
                opacity: 0;
                transition: opacity 0.3s;
            }
            .s1-card-img-wrap img.loaded { opacity: 1; }
 
            /* Colour accent strip */
            .s1-card-img-wrap::after {
                content: '';
                position: absolute; top: 0; left: 0; right: 0;
                height: 3px; z-index: 2;
                border-radius: var(--s1-radius) var(--s1-radius) 0 0;
            }
            .s1-card-img-wrap[data-color="A"]::after { background: var(--c-arcane); }
            .s1-card-img-wrap[data-color="P"]::after { background: var(--c-primal); }
            .s1-card-img-wrap[data-color="R"]::after { background: var(--c-refined); }
            .s1-card-img-wrap[data-color="T"]::after { background: var(--c-tech); }
            .s1-card-img-wrap[data-color="X"]::after { background: var(--c-resourceless); }
            /* Multi cards get a gold gradient; JS also sets a custom linear-gradient inline */
            .s1-card-img-wrap[data-color*=","]::after { background: linear-gradient(90deg,#f5d680,#c8a84b,#8b6914); }
 
            /* Range badge on card corner */
            .s1-range-badge {
                position: absolute;
                bottom: 6px; left: 6px;
                z-index: 3;
                background: #000000aa;
                border: 1px solid #ffffff18;
                border-radius: 5px;
                padding: 2px 7px;
                font-size: 0.58rem;
                font-family: 'Cinzel', serif;
                color: #b0b0b0;
                backdrop-filter: blur(4px);
                pointer-events: none;
                display: flex; align-items: center; gap: 3px;
                line-height: 1.4;
                letter-spacing: 0.04em;
            }
            .s1-range-badge.melee  { border-color: #c0394a44; color: #e8a8a8; }
            .s1-range-badge.ranged { border-color: #4a8fd444; color: #a8c8e8; }
 
            /* ── TOOLTIP (body-level fixed, escapes all stacking contexts) ── */
            #s1-global-tooltip {
                position: fixed;
                background: #12101eee;
                border: 1px solid var(--s1-border);
                border-radius: 9px;
                padding: 10px 14px;
                white-space: nowrap;
                font-size: 0.8rem;
                color: var(--s1-text);
                pointer-events: none;
                opacity: 0;
                transition: opacity 0.15s;
                z-index: 99999;
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
                box-shadow: 0 6px 32px #000000bb;
                min-width: 170px;
            }
            #s1-global-tooltip.visible { opacity: 1; }
 
            .tt-name {
                font-family: 'Cinzel', serif;
                font-size: 0.84rem;
                font-weight: 700;
                display: block;
                margin-bottom: 5px;
                color: var(--s1-text);
                border-bottom: 1px solid var(--s1-border);
                padding-bottom: 5px;
            }
            .tt-subheader {
                font-size: 0.70rem;
                color: var(--s1-muted);
                font-style: italic;
                display: block;
                margin-bottom: 6px;
            }
            .tt-row {
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 16px;
                padding: 2px 0;
            }
            .tt-label {
                color: var(--s1-muted);
                font-family: 'Cinzel', serif;
                font-size: 0.66rem;
                letter-spacing: 0.07em;
                text-transform: uppercase;
            }
            .tt-value        { color: var(--s1-text); font-weight: 600; font-size: 0.78rem; }
            .tt-value.gold   { color: var(--s1-gold); }
            .tt-value.red    { color: #e07878; }
            .tt-value.green  { color: #78c878; }
            .tt-value.blue   { color: #78aae0; }
 
            .tt-color-row {
                display: flex; align-items: center; gap: 5px;
                padding-top: 5px;
                margin-top: 4px;
                border-top: 1px solid var(--s1-border);
            }
            .tt-color-row img {
                width: 13px; height: 13px; object-fit: contain;
            }
            .tt-color-name {
                font-family: 'Cinzel', serif;
                font-size: 0.66rem;
                letter-spacing: 0.05em;
                color: var(--s1-muted);
            }
            .tt-color-dot {
                width: 10px; height: 10px;
                border-radius: 50%;
                flex-shrink: 0;
                display: inline-block;
            }
 
            /* Card name label */
            .s1-card-name {
                text-align: center;
                padding: 5px 4px 1px;
                font-family: 'Cinzel', serif;
                font-size: 0.65rem;
                font-weight: 600;
                letter-spacing: 0.03em;
                color: var(--s1-muted);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                transition: color 0.2s;
            }
            .s1-card:hover .s1-card-name { color: var(--s1-text); }
 
            /* Section dividers */
            .s1-divider {
                grid-column: 1 / -1;
                display: flex; align-items: center; gap: 14px;
                margin: 12px 0 4px;
                color: var(--s1-muted);
                font-family: 'Cinzel', serif;
                font-size: 0.72rem;
                letter-spacing: 0.12em;
                text-transform: uppercase;
            }
            .s1-divider::before, .s1-divider::after {
                content: ''; flex: 1; height: 1px; background: var(--s1-border);
            }
 
            /* Empty state */
            .s1-empty {
                grid-column: 1 / -1;
                text-align: center;
                padding: 80px 20px;
                color: var(--s1-muted);
                font-family: 'Cinzel', serif;
                font-size: 1rem;
            }
            .s1-empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
 
            /* ── ANIMATIONS ─────────────────────────────────────────────── */
            @keyframes s1Shimmer {
                0%   { background-position:  200% 0; }
                100% { background-position: -200% 0; }
            }
            @keyframes s1FadeUp {
                from { opacity: 0; transform: translateY(10px); }
                to   { opacity: 1; transform: translateY(0); }
            }
 
            /* ── RESPONSIVE ─────────────────────────────────────────────── */
            @media (max-width: 700px) {
                .set-hero        { padding: 28px 16px 24px; }
                .s1-controls     { padding: 10px 16px; }
                .s1-gallery-wrap { padding: 16px 16px 40px; }
                #s1-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
                #s1-sort { margin-left: 0; }
                .s1-ctrl-divider { display: none; }
            }
        </style>
    </head>
    <body>
 
        <!-- ── HEADER ──────────────────────────────────────────────────── -->
        <header class="main-banner">
            <div class="banner-content">
                <div class="logo">
                    <img src="../Assets/NML_Final_Logo.png" alt="Game Logo" class="banner-logo-img" fetchpriority="high" loading="eager">
                </div>
                <nav class="banner-buttons">
                    <a href="../" class="nav-btn">Home</a>
                    <a href="../how-to-play/" class="nav-btn">How To Play</a>
                    <a href="../card-gallary/" class="nav-btn active">Card Gallery</a>
                    <a href="../downloads/" class="nav-btn">Downloads</a>
                </nav>
            </div>
        </header>
 
        <!-- ── GALLERY PAGE ────────────────────────────────────────────── -->
        <div class="gallery-page">
 
            <!-- Set Hero -->
            <div class="set-hero">
                <div class="set-hero-inner">
                    <div class="set-emblem">
                        <img src="../Assets/NML_Final_Logo.png" alt="Set 1">
                    </div>
                    <div class="set-hero-text">
                        <h1>Set 1</h1>
                        <div class="set-badges">
                            <span class="set-badge">📜 280 Cards</span>
                            <span class="set-badge">🌐 Base Set</span>
                            <span class="set-badge">🃏 Playtesting Edition</span>
                        </div>
                    </div>
                </div>
            </div>
 
            <!-- Controls Bar -->
            <div class="s1-controls">
                <div class="s1-controls-inner">
 
                    <!-- Search -->
                    <div class="s1-search-wrap">
                        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                        </svg>
                        <input id="s1-search" type="text" placeholder="Search cards…" autocomplete="off">
                    </div>
 
                    <div class="s1-ctrl-divider"></div>
 
                    <!-- Color Filter -->
                    <div class="s1-filter-group">
                        <span class="s1-filter-label">Color</span>
                        <button class="s1-color-btn active" data-color="A" title="Arcane">
                            <img src="../Assets/ARCANE.png" alt="Arcane">
                        </button>
                        <button class="s1-color-btn active" data-color="P" title="Primal">
                            <img src="../Assets/PRIMAL.png" alt="Primal">
                        </button>
                        <button class="s1-color-btn active" data-color="R" title="Refined">
                            <img src="../Assets/REFINED.png" alt="Refined">
                        </button>
                        <button class="s1-color-btn active" data-color="T" title="Tech">
                            <img src="../Assets/TECH.png" alt="Tech">
                        </button>
                        <button class="s1-color-btn multi       active" data-color="M" title="Multi"></button>
                        <button class="s1-color-btn resourceless active" data-color="X" title="Resourceless"></button>
                    </div>
 
                    <div class="s1-ctrl-divider"></div>
 
                    <!-- Type Filter -->
                    <div class="s1-filter-group">
                        <span class="s1-filter-label">Type</span>
                        <button class="s1-pill-btn active" data-type="all">All</button>
                        <button class="s1-pill-btn" data-type="Creature">Creature</button>
                        <button class="s1-pill-btn" data-type="Spell">Spell</button>
                        <button class="s1-pill-btn" data-type="Terrain">Terrain</button>
                        <button class="s1-pill-btn" data-type="Construct">Construct</button>
                    </div>
 
                    <div class="s1-ctrl-divider"></div>
 
                    <!-- Range Filter -->
                    <div class="s1-filter-group">
                        <span class="s1-filter-label">Range</span>
                        <button class="s1-pill-btn active"               data-range="all">All</button>
                        <button class="s1-pill-btn range-melee  active"  data-range="melee">⚔ Melee</button>
                        <button class="s1-pill-btn range-ranged active"  data-range="ranged">🏹 Ranged</button>
                    </div>
 
                    <!-- Sort + Count -->
                    <select id="s1-sort">
                        <option value="number">Card #</option>
                        <option value="name">Name A–Z</option>
                        <option value="cost">Cost</option>
                        <option value="power">Power</option>
                    </select>
                    <span id="s1-count">— cards</span>
                </div>
            </div>
 
            <!-- Card Grid -->
            <div class="s1-gallery-wrap">
                <div id="s1-grid"></div>
            </div>
 
        </div><!-- /.gallery-page -->
 
        <!-- ── FOOTER ──────────────────────────────────────────────────── -->
        <div class="links-container">
            <div>Join Us On Our Socials!</div>
            <div class="links">
                <a href="https://discord.gg/ymBTwPd3w2" class="social-link">
                    <img src="../Assets/discord-logo.png" alt="discord logo" class="social-logo-img">
                </a>
                <a href="https://www.twitch.tv/nomanslandtcg" class="social-link">
                    <img src="../Assets/twitch-logo.png" alt="twitch logo" class="social-logo-img">
                </a>
                <a href="https://www.instagram.com/nomanslandtcg/" class="social-link">
                    <img src="../Assets/insta-logo.png" alt="instagram logo" class="social-logo-img">
                </a>
            </div>
        </div>
        <div class="RLS-logo">
            <img src="../Assets/RLS_Logo.png" alt="RLS Logo" class="RLS-logo-img" fetchpriority="high" loading="eager">
        </div>
 
        <!-- ── SCRIPT ──────────────────────────────────────────────────── -->
        <script>
        // ── CONFIG ────────────────────────────────────────────────────────
        const CARD_BASE_URL = "../Assets/Cards/";
 
        const COLOR_ICON = {
            A: "../Assets/ARCANE.png",
            P: "../Assets/PRIMAL.png",
            R: "../Assets/REFINED.png",
            T: "../Assets/TECH.png",
            M: null,
            X: null
        };
        const COLOR_LABEL = {
            A: "Arcane",
            P: "Primal",
            R: "Refined",
            T: "Tech",

            { number:273,  name:"Sparhawk the Forgiven",            file:"Sparhawk_the_Forgiven.png",           type:"Creature",    subtype:"Dargonkin Paladin",        color:["P","R"], cost:6, power:5, health:6, range:1 },
            { number:274,  name:"Supply Runner",                    file:"Supply_Runner.png",                   type:"Creature",    subtype:"Halfling",                 color:["R","T"], cost:2, power:2, health:2, range:1 },
            { number:275,  name:"Synthetic Apex",                   file:"Synthetic_Apex.png",                  type:"Spell",       subtype:"Prepared",                 color:["P","T"], cost:4 },
            { number:276,  name:"Untamed Enhancements",             file:"Untamed_Enhancements.png",            type:"Spell",       subtype:"Reaction",                 color:["R","T"], cost:3 },
            { number:277,  name:"Valkor's Advisor",                 file:"Valkor's_Advisor.png",                type:"Creature",    subtype:"Human Warlock",            color:["A","P"], cost:3, power:3, health:2, range:2 },
            { number:278,  name:"Verrlaine, Realm Negotiator",      file:"Verrlaine,_Realm_Negotiator.png",     type:"Creature",    subtype:"Human",                    color:["A","P","T"], cost:3, power:4, health:2, range:1 },
            { number:279,  name:"Zhen'Xibal Cavern",                file:"Zhen'Xibal_Cavern.png",               type:"Terrain",     subtype:"Field",                    color:["P","T"], cost:4 },
 
            // ── Resourceless ──────────────────────────────────────────────
            { number:280, name:"Plague Rat",    file:"Plague_Rat.png",    type:"Creature",  subtype:"Rat",    color:"X", cost:1, power:1, health:1 },
        ];
 
             // ── CARD LOOKUP (indexed by CARDS array position for fast tooltip access)
        const _cardLookup = {};
        CARDS.forEach((c, i) => { _cardLookup[i] = c; });
 
        // ── STATE ─────────────────────────────────────────────────────────
        // Default: all on = show everything.
        // Individual buttons (A/P/R/T): exact-match filter — selecting A+P shows ONLY A+P multi cards.
        // M button: independent "show all multi" toggle.
        // X button: independent "show Resourceless" toggle.
        // ALL_INDIVIDUAL & ALL_COLORS are declared in the Events block (hoisted for getFiltered use).
        const ALL_INDIVIDUAL = ["A","P","R","T"];
        const ALL_COLORS     = ["A","P","R","T","M","X"];
        let activeColors = new Set(["A","P","R","T","M","X"]);
        let activeType   = "all";
        let activeRange  = "all";   // "all" | "melee" | "ranged"
        let searchQuery  = "";
        let sortMode     = "number";
 
        const grid  = document.getElementById("s1-grid");
        const count = document.getElementById("s1-count");
 
        // ── HELPERS ───────────────────────────────────────────────────────
        function cardColors(c) {
            // Normalise: always return an array of color codes
            return Array.isArray(c.color) ? c.color : [c.color];
        }
 
        function cardColorLabel(c) {
            const cols = cardColors(c);
            return cols.map(k => COLOR_LABEL[k] || k).join(" / ");
        }
 
        function getFiltered() {
            // Work out what the player has selected
            const allOn = ALL_INDIVIDUAL.every(k => activeColors.has(k))
                       && activeColors.has("M")
                       && activeColors.has("X");
 
            // The individual color buttons that are currently active (A/P/R/T only)
            const selIndividual = ALL_INDIVIDUAL.filter(k => activeColors.has(k));
            const selSet        = new Set(selIndividual);
 
            return CARDS.filter(c => {
                if (!c.name) return false;
 
                // ── Color filter ─────────────────────────────────────────
                if (!allOn) {
                    const cols    = cardColors(c);
                    const isMulti = cols.length > 1;
                    const isRL    = cols.length === 1 && cols[0] === "X";
 
                    if (isRL) {
                        // Resourceless card: only show when X button is active
                        if (!activeColors.has("X")) return false;
                    } else if (isMulti) {
                        // Multi card: show if…
                        //   • the M (all-multi) button is on, OR
                        //   • the card's exact color set matches exactly the selected individual buttons
                        const cardSet = new Set(cols);
                        const exactMatch =
                            cardSet.size === selSet.size &&
                            cols.every(k => selSet.has(k));
                        if (!activeColors.has("M") && !exactMatch) return false;
                    } else {
                        // Single-color card: exact match — selected individual buttons
                        // must be ONLY that one color (no other individual buttons active)
                        const cardColor = cols[0];
                        if (!selSet.has(cardColor)) return false;
                        // If the player has selected more than one individual color,
                        // a pure single-color card no longer qualifies — only exact combos do
                        if (selSet.size > 1) return false;
                    }
                }
 
                // ── Type filter ──────────────────────────────────────────
                if (activeType !== "all" && c.type !== activeType) return false;
 
                // ── Range filter ─────────────────────────────────────────
                if (activeRange === "melee"  && !(c.range === 1))          return false;
                if (activeRange === "ranged" && !(c.range && c.range > 1)) return false;
 
                // ── Search ───────────────────────────────────────────────
                if (searchQuery) {
                    const q = searchQuery.toLowerCase();
                    if (!c.name.toLowerCase().includes(q) &&
                        !(c.subtype||"").toLowerCase().includes(q) &&
                        !c.type.toLowerCase().includes(q) &&
                        !cardColorLabel(c).toLowerCase().includes(q)) return false;
                }
                return true;
            });
        }
 
        function getSorted(arr) {
            const a = [...arr];
            if (sortMode === "name")   a.sort((x,y) => x.name.localeCompare(y.name));
            if (sortMode === "cost")   a.sort((x,y) => (x.cost||0)-(y.cost||0));
            if (sortMode === "power")  a.sort((x,y) => (y.power||0)-(x.power||0));
            if (sortMode === "number") a.sort((x,y) => x.number-y.number);
            return a;
        }
 
        function blankCard(name) {
            return `data:image/svg+xml,${encodeURIComponent(
                `<svg xmlns="http://www.w3.org/2000/svg" width="170" height="238" viewBox="0 0 170 238">
                    <rect width="170" height="238" rx="8" fill="#1c1929"/>
                    <text x="85" y="100" dominant-baseline="middle" text-anchor="middle" fill="#2e2845" font-size="52">🃏</text>
                    <text x="85" y="148" dominant-baseline="middle" text-anchor="middle" fill="#7a708e" font-size="9" font-family="Georgia,serif">${name}</text>
                </svg>`
            )}`;
        }
 
        // ── TOOLTIP HTML per type ─────────────────────────────────────────
        function buildTooltip(c) {
            // Color pip(s) — supports single string or array
            const cols = Array.isArray(c.color) ? c.color : [c.color];
            const colorHtml = cols.map(k => {
                const icon = COLOR_ICON[k];
                return icon
                    ? `<img src="${icon}" alt="${COLOR_LABEL[k]}" style="width:13px;height:13px;object-fit:contain;"><span class="tt-color-name">${COLOR_LABEL[k]}</span>`
                    : `<span class="tt-color-dot" style="background:${k==="X"?"#9e9e9e":"#c8a84b"}"></span><span class="tt-color-name">${COLOR_LABEL[k]}</span>`;
            }).join('<span style="color:var(--s1-border);margin:0 2px">·</span>');
 
            let rows = "";
 
            if (c.type === "Creature") {
                const rLabel = c.range === 1 ? "⚔ Melee" : `🏹 Range ${c.range}`;
                rows = `
                    <div class="tt-row"><span class="tt-label">Cost</span>   <span class="tt-value gold">${c.cost ?? "—"}</span></div>
                    <div class="tt-row"><span class="tt-label">Range</span>  <span class="tt-value blue">${rLabel}</span></div>
                    <div class="tt-row"><span class="tt-label">Attack</span> <span class="tt-value red">${c.power ?? "—"}</span></div>
                    <div class="tt-row"><span class="tt-label">Health</span> <span class="tt-value green">${c.health ?? "—"}</span></div>`;
            } else if (c.type === "Spell") {
                rows = `
                    <div class="tt-row"><span class="tt-label">Cost</span>    <span class="tt-value gold">${c.cost ?? "—"}</span></div>
                    <div class="tt-row"><span class="tt-label">Subtype</span> <span class="tt-value">${c.subtype ?? "—"}</span></div>`;
            } else if (c.type === "Terrain") {
                rows = `
                    <div class="tt-row"><span class="tt-label">Cost</span>    <span class="tt-value gold">${c.cost ?? "—"}</span></div>
                    <div class="tt-row"><span class="tt-label">Subtype</span> <span class="tt-value">${c.subtype ?? "—"}</span></div>`;
            } else if (c.type === "Construct") {
                rows = `
                    <div class="tt-row"><span class="tt-label">Cost</span>   <span class="tt-value gold">${c.cost ?? "—"}</span></div>
                    <div class="tt-row"><span class="tt-label">Health</span> <span class="tt-value green">${c.health ?? "—"}</span></div>`;
            }
 
            return `
                <span class="tt-name">${c.name}</span>
                <span class="tt-subheader">${c.type}${c.subtype ? " — " + c.subtype : ""}</span>
                ${rows}
                <div class="tt-color-row">${colorHtml}</div>`;
        }
 
        // ── RANGE BADGE on card image ─────────────────────────────────────
        function rangeBadge(c) {
            if (!c.range) return "";
            const cls = c.range === 1 ? "melee" : "ranged";
            const ico = c.range === 1 ? "⚔" : "🏹";
            const lbl = c.range === 1 ? "Melee" : `Range ${c.range}`;
            return `<div class="s1-range-badge ${cls}">${ico} ${lbl}</div>`;
        }
 
        // ── RENDER ────────────────────────────────────────────────────────
        const TYPE_ORDER = ["Creature","Spell","Terrain","Construct"];
 
        function renderGrid() {
            const filtered = getSorted(getFiltered());
            count.textContent = `${filtered.length} card${filtered.length !== 1 ? "s" : ""}`;
 
            if (!filtered.length) {
                grid.innerHTML = `<div class="s1-empty"><div class="s1-empty-icon">🔍</div>No cards match your filters.</div>`;
                return;
            }
 
            const grouped = {};
            filtered.forEach(c => (grouped[c.type] = grouped[c.type] || []).push(c));
 
            let html = "";
            let idx  = 0;
 
            TYPE_ORDER.forEach(type => {
                if (!grouped[type]) return;
                html += `<div class="s1-divider">${type}s &nbsp;(${grouped[type].length})</div>`;
                grouped[type].forEach(c => {
                    const cardIdx = CARDS.indexOf(c);
                    const delay = Math.min(idx++ * 14, 350);
                    const src   = CARD_BASE_URL + encodeURIComponent(c.file);
                    html += `
                    <div class="s1-card" tabindex="0" data-idx="${cardIdx}" style="animation-delay:${delay}ms">
                        <div class="s1-card-img-wrap" data-color="${Array.isArray(c.color)?c.color.join(','):c.color}">
                            <img src="${src}" alt="${c.name}" loading="lazy"
                                onload="this.classList.add('loaded')"
                                onerror="this.src='${blankCard(c.name)}';this.classList.add('loaded')">
                        </div>
                        <div class="s1-card-name">${c.name}</div>
                    </div>`;
                });
            });
 
            grid.innerHTML = html;
 
            // Attach card data objects so the tooltip can read them without parsing HTML
            grid.querySelectorAll(".s1-card[data-idx]").forEach(el => {
                el._cardData = _cardLookup[+el.dataset.idx];
            });
        }
 
        // ── GLOBAL TOOLTIP ───────────────────────────────────────────────
        // Lives on <body> so it is never clipped by any stacking context.
        const gtt = document.createElement("div");
        gtt.id = "s1-global-tooltip";
        document.body.appendChild(gtt);
 
        let ttHideTimer = null;
 
        function showTooltip(card, event) {
            const c = card._cardData;
            if (!c) return;
            clearTimeout(ttHideTimer);
            gtt.innerHTML = buildTooltip(c);
            gtt.classList.add("visible");
            positionTooltip(event);
        }
 
        function hideTooltip() {
            ttHideTimer = setTimeout(() => gtt.classList.remove("visible"), 80);
        }
 
        function positionTooltip(event) {
            const TIP_GAP = 12;
            const tw = gtt.offsetWidth  || 200;
            const th = gtt.offsetHeight || 120;
 
            let x = event.clientX - tw / 2;         // centred on cursor X
            let y = event.clientY - th - TIP_GAP;   // above cursor
 
            // Clamp to viewport
            const vw = window.innerWidth;
            const vh = window.innerHeight;
            if (x < 8)        x = 8;
            if (x + tw > vw - 8) x = vw - tw - 8;
            if (y < 8)        y = event.clientY + TIP_GAP; // flip below if no room above
 
            gtt.style.left = x + "px";
            gtt.style.top  = y + "px";
        }
 
        // Wire tooltip events onto the grid via delegation
        grid.addEventListener("mouseover", e => {
            const card = e.target.closest(".s1-card");
            if (card) showTooltip(card, e);
        });
        grid.addEventListener("mousemove", e => {
            if (gtt.classList.contains("visible")) positionTooltip(e);
        });
        grid.addEventListener("mouseout", e => {
            if (!e.relatedTarget || !e.relatedTarget.closest(".s1-card")) hideTooltip();
        });
 
        // ── EVENTS ────────────────────────────────────────────────────────
        // Individual color codes (A/P/R/T) used for exact-match logic.
        // M = "show all multi", X = "show Resourceless" — treated as independent toggles.
        // ALL_INDIVIDUAL and ALL_COLORS are declared in the State block above.
 
        function syncColorBtnVisuals() {
            document.querySelectorAll(".s1-color-btn").forEach(btn => {
                btn.classList.toggle("active", activeColors.has(btn.dataset.color));
            });
        }
 
        document.querySelectorAll(".s1-color-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                const c = btn.dataset.color;
                const allOn = ALL_COLORS.every(k => activeColors.has(k));
 
                if (allOn) {
                    // First click from "all-on" default → clear everything, activate just this button
                    activeColors.clear();
                    activeColors.add(c);
                } else {
                    if (activeColors.has(c)) {
                        activeColors.delete(c);
                        // Nothing left → reset to default all-on
                        if (activeColors.size === 0) {
                            ALL_COLORS.forEach(k => activeColors.add(k));
                        }
                    } else {
                        activeColors.add(c);
                        // All re-selected → normalise back to all-on
                        if (ALL_COLORS.every(k => activeColors.has(k))) {
                            ALL_COLORS.forEach(k => activeColors.add(k));
                        }
                    }
                }
                syncColorBtnVisuals();
                renderGrid();
            });
        });
 
        document.querySelectorAll(".s1-pill-btn[data-type]").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".s1-pill-btn[data-type]").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                activeType = btn.dataset.type;
                renderGrid();
            });
        });
 
        document.querySelectorAll(".s1-pill-btn[data-range]").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".s1-pill-btn[data-range]").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                activeRange = btn.dataset.range;
                renderGrid();
            });
        });
 
        document.getElementById("s1-search").addEventListener("input", e => {
            searchQuery = e.target.value.trim();
            renderGrid();
        });
 
        document.getElementById("s1-sort").addEventListener("change", e => {
            sortMode = e.target.value;
            renderGrid();
        });
 
        // ── HEADER HEIGHT OFFSET ──────────────────────────────────────────
        // Keeps the sticky filter bar just below the site header at all times.
        function setHeaderOffset() {
            const header = document.querySelector("header.main-banner");
            if (header) {
                document.documentElement.style.setProperty(
                    "--header-height",
                    header.getBoundingClientRect().height + "px"
                );
            }
        }
        setHeaderOffset();
        window.addEventListener("resize", setHeaderOffset);
 
        // ── INIT ──────────────────────────────────────────────────────────
        renderGrid();
        </script>
    </body>
</html>
